<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerbero · Mi perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #050508;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
        }
        .profile-card {
            background: #0a0a0f;
            border: 1px solid #00f3ff;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.1);
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #00f3ff, #b026ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #00f3ff, #b026ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 20px;
        }
        .username {
            font-size: 1.5rem;
            font-weight: 600;
            color: #00f3ff;
            margin-bottom: 15px;
        }
        .bio {
            background: #12121a;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            color: rgba(255,255,255,0.8);
            line-height: 1.6;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #00ff9d;
        }
        .stat-label {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
        }
        .btn {
            background: linear-gradient(135deg, #00f3ff, #b026ff);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 15px;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #00f3ff;
            color: #00f3ff;
        }
        .btn-outline:hover {
            background: rgba(0, 243, 255, 0.1);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.3);
        }
        a {
            text-decoration: none;
            display: block;
        }
        .loading {
            color: #00f3ff;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="profile-card" id="profileContent">
        <div class="loading">🐕 Cargando perfil...</div>
    </div>

    <script>
        const token = localStorage.getItem('accessToken');
        
        if (!token) {
            window.location.href = '/';
        }
        
        async function loadProfile() {
            try {
                const res = await fetch('/api/auth/profile/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!res.ok) {
                    throw new Error('No autorizado');
                }
                
                const data = await res.json();
                
                document.getElementById('profileContent').innerHTML = `
                    <h1>🐕 Mi perfil</h1>
                    <div class="avatar">🐕</div>
                    <div class="username">@${data.username}</div>
                    <div class="bio">${data.bio || 'Sin biografía aún. Haz clic en editar para agregar una.'}</div>
                    <div class="stats">
                        <div class="stat"><div class="stat-value">${data.stats.projects}</div><div class="stat-label">Proyectos</div></div>
                        <div class="stat"><div class="stat-value">${data.stats.views}</div><div class="stat-label">Vistas</div></div>
                        <div class="stat"><div class="stat-value">${data.stats.files}</div><div class="stat-label">Archivos</div></div>
                    </div>
                    <button class="btn" onclick="editBio()">✏️ Editar biografía</button>
                    <a href="/" class="btn btn-outline" style="text-align: center;">← Volver a Cerbero</a>
                `;
            } catch (error) {
                localStorage.removeItem('accessToken');
                localStorage.removeItem('refreshToken');
                window.location.href = '/';
            }
        }
        
        async function editBio() {
            const newBio = prompt('Escribe tu biografía:');
            if (newBio !== null) {
                try {
                    const res = await fetch('/api/auth/profile/', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ bio: newBio })
                    });
                    if (res.ok) {
                        loadProfile();
                    } else {
                        alert('Error al actualizar');
                    }
                } catch (error) {
                    alert('Error de conexión');
                }
            }
        }
        
        loadProfile();
    </script>
</body>
</html>
